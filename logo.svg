<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" fill="none">
  <!-- Chat bubble icon -->
  <rect x="4" y="8" width="64" height="48" rx="14" fill="#8e0000"/>
  <polygon points="18,56 28,68 34,56" fill="#8e0000"/>
  <!-- Text lines inside bubble -->
  <rect x="18" y="22" width="36" height="4" rx="2" fill="#ffffff" opacity="0.9"/>
  <rect x="18" y="32" width="28" height="4" rx="2" fill="#ffffff" opacity="0.7"/>
  <rect x="18" y="42" width="20" height="4" rx="2" fill="#ffffff" opacity="0.5"/>
  <!-- Brand name: Texting -->
  <text x="82" y="40" font-family="Montserrat, Arial, sans-serif" font-size="36" font-weight="800" fill="#8e0000" letter-spacing="-0.5">Texting</text>
  <!-- Brand name: Factory -->
  <text x="272" y="40" font-family="Montserrat, Arial, sans-serif" font-size="36" font-weight="800" fill="#106e09" letter-spacing="-0.5">Factory</text>
  <!-- Tagline -->
  <text x="82" y="58" font-family="Inter, Arial, sans-serif" font-size="11" fill="#5d3f3b" letter-spacing="3" font-weight="500">KENYA</text>
